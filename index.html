<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spam Email Detection and Classification System</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="left-panel">

<h1>Spam Email Detection and Classification System</h1>

<p class="subtitle">
Using Supervised Machine Learning Models
</p>

<div class="form-group">
<label>Sender Name</label>
<input type="text" id="sender" placeholder="Enter Sender Name">
</div>

<div class="form-group">
<label>Email Subject</label>
<input type="text" id="subject" placeholder="Enter Email Subject">
</div>

<div class="form-group">
<label>Email Message</label>
<textarea id="message" rows="10" placeholder="Enter Email Content"></textarea>
</div>

<button onclick="predictEmail()">
Predict Email
</button>

</div>

<div class="right-panel">

<h2>Prediction Result</h2>

<div class="result-card">

<div class="emoji" id="emoji">
📧
</div>

<h3 id="result">
Waiting for Prediction...
</h3>

<p id="confidence">
Confidence : --
</p>

<p id="status">
Email Status : --
</p>

<p id="recommendation">
Enter the email details and click Predict Email.
</p>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
